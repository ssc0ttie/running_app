name: Strava Auto Sync Supabase - Production

on:
  schedule:
    - cron: "0 6,12,18,0 * * *"
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days to look back"
        required: false
        default: "2"
        type: choice
        options:
          - "2"
          - "7"
          - "30"
          - "60"
          - "90"

jobs:
  sync-strava-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent hung jobs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests supabase
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Strava sync
        env:
          STRAVA_USERS: ${{ secrets.STRAVA_USERS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DAYS_BACK: ${{ github.event.inputs.days_back || '30' }}
        run: |
          python scripts/auto_sync_supa.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-error-logs
          path: |
            *.log
            sync_output.txt
          retention-days: 7

      - name: Send success notification
        if: success()
        run: |
          echo "✅ Strava sync completed successfully at $(date)"

      - name: Send failure notification (only for critical failures)
        if: failure() && github.run_attempt == 3
        run: |
          echo "❌ Strava sync failed critically after 3 attempts"