name: Strava Auto Sync - Production

on:
  schedule:
    # Run at 6 AM, 12 PM, 6 PM, 12 AM UTC daily
    - cron: "0 6,12,18,0 * * *"
  workflow_dispatch: # Allow manual trigger
    inputs:
      days_back:
        description: "Days to look back"
        required: false
        default: "30"
        type: choice
        options:
          - "7"
          - "30"
          - "60"
          - "90"

jobs:
  sync-strava-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas gspread oauth2client requests
          # If you have a requirements.txt file:
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Strava sync
        env:
          STRAVA_USERS: ${{ secrets.STRAVA_USERS }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          DAYS_BACK: ${{ github.event.inputs.days_back || '30' }}
        run: |
          python scripts/auto_sync.py

      - name: Send success notification
        if: success()
        run: |
          echo "✅ Strava sync completed successfully at $(date)"

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ Strava sync failed at $(date)"
