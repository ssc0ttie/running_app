name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Test STRAVA_USERS secret (Python)
        env:
          STRAVA_USERS: ${{ secrets.STRAVA_USERS }}
        run: |
          python -c "
          import os
          import json
          
          strava_users = os.environ.get('STRAVA_USERS', '')
          if strava_users:
              print('✅ STRAVA_USERS secret exists')
              try:
                  users = json.loads(strava_users)
                  print(f'✅ Valid JSON with {len(users)} user(s): {list(users.keys())}')
              except json.JSONDecodeError as e:
                  print(f'❌ Invalid JSON: {e}')
                  exit(1)
          else:
              print('❌ STRAVA_USERS secret is missing')
              exit(1)
          "
      
      - name: Test SUPABASE_URL secret
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          if [ -n "$SUPABASE_URL" ]; then
            echo "✅ SUPABASE_URL secret exists"
            echo "URL: $SUPABASE_URL"
          else
            echo "❌ SUPABASE_URL secret is missing"
            exit 1
          fi
      
      - name: Test SUPABASE_KEY secret
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "$SUPABASE_KEY" ]; then
            echo "✅ SUPABASE_KEY secret exists"
            echo "Key starts with: ${SUPABASE_KEY:0:20}..."
          else
            echo "❌ SUPABASE_KEY secret is missing"
            exit 1
          fi
