name: Test Secrets

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Test STRAVA_USERS secret
        run: |
          if [ -n "${{ secrets.STRAVA_USERS }}" ]; then
            echo "✅ STRAVA_USERS secret exists"
            # Test if it's valid JSON (optional)
            echo "${{ secrets.STRAVA_USERS }}" | jq . > /dev/null 2>&1 && echo "✅ STRAVA_USERS is valid JSON" || echo "⚠️ STRAVA_USERS is not valid JSON"
          else
            echo "❌ STRAVA_USERS secret is missing"
            exit 1
          fi
      
      - name: Test SUPABASE_URL secret
        run: |
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then
            echo "✅ SUPABASE_URL secret exists"
            echo "URL starts with: ${SUPABASE_URL:0:20}..."
          else
            echo "❌ SUPABASE_URL secret is missing"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      
      - name: Test SUPABASE_KEY secret
        run: |
          if [ -n "${{ secrets.SUPABASE_KEY }}" ]; then
            echo "✅ SUPABASE_KEY secret exists"
            echo "Key starts with: ${SUPABASE_KEY:0:20}..."
          else
            echo "❌ SUPABASE_KEY secret is missing"
            exit 1
          fi
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      
      - name: Test all secrets together
        run: |
          echo "========================================="
          echo "All secrets test completed"
          echo "========================================="
          echo "✅ STRAVA_USERS: Present"
          echo "✅ SUPABASE_URL: Present"
          echo "✅ SUPABASE_KEY: Present"
          echo "========================================="
